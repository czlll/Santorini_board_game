name: CI

# Controls when the workflow will run
on:
  # Triggers the workflow on push or pull request events but only for the main branch
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "build"
  build:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          
      # Checks-out Java
      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 17

      # Checks-out Node
      - uses: actions/setup-node@v4
        with:
          node-version: 18

      # Cache Maven dependencies
      - name: Cache Maven dependencies
        uses: actions/cache@v3
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      # Identifies all relevant Java files that have been changed in latest commit
      - name: Change Java
        uses: tj-actions/changed-files@v40
        id: change-java
        with:
          files: |
            backend/pom.xml
            backend/**/*.java
      
      # Identifies all relevant TS files that have been changed in latest commit
      - name: Change TS
        uses: tj-actions/changed-files@v40
        id: change-ts
        with:
          files: |
            frontend/**/*.ts
            frontend/**/*.js
            frontend/**/*.json
            typescript/**/*.ts
            typescript/**/*.json
      
      # Runs Maven build and tests for Java files
      - name: Run Java build and tests
        if: steps.change-java.outputs.any_changed == 'true'
        run: |
          cd backend
          timeout 5m mvn clean compile test
          timeout 2m mvn site
      
      # Runs compiler and linter for TS files
      - name: Run on TS files
        if: steps.change-ts.outputs.any_changed == 'true'
        run: |
          if [ -d "typescript/" ]; then
            timeout 2m npm install --prefix typescript/
            timeout 2m npm run compile --prefix typescript/
            timeout 2m npm run lint --prefix typescript/
          fi
