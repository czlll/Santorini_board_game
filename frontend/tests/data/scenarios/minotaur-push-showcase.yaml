# Minotaur推动能力综合测试
# 全面测试Minotaur神卡的推动能力在各种情况下的表现

id: minotaur_push_comprehensive
name: Minotaur推动能力综合测试
description: |
  全面测试Minotaur神卡的推动能力，包括基本推动、推动到边界、
  推动被阻挡等各种场景，验证推动逻辑的正确性和完整性。
version: "1.0"
tags:
  - minotaur
  - push-move
  - boundary-test
  - god-card
  - comprehensive
  - edge-cases

setup:
  players:
    player1:
      name: Minotaur_Alice
      godCard: Minotaur
    player2:
      name: Apollo_Bob
      godCard: Apollo  # 使用Apollo作为对手，测试两种移动型神卡
  boardSize:
    width: 5
    height: 5

moves:
  # === 工人放置阶段 ===
  - step: 1
    type: place_worker
    player: player1
    to: {x: 2, y: 2}  # Minotaur在中心，便于展示各方向推动
    metadata:
      workerIndex: 0
      description: "Minotaur Alice在中心放置工人，最佳推动位置"
      
  - step: 2
    type: place_worker
    player: player1
    to: {x: 0, y: 0}  # Minotaur第二个工人在角落
    metadata:
      workerIndex: 1
      description: "Minotaur Alice在角落放置第二个工人"
      
  - step: 3
    type: place_worker
    player: player2
    to: {x: 2, y: 1}  # Apollo工人在Minotaur正上方
    metadata:
      workerIndex: 0
      description: "Apollo Bob工人放置在Minotaur正上方，准备被推动"
      
  - step: 4
    type: place_worker
    player: player2
    to: {x: 4, y: 2}  # Apollo第二个工人在右侧
    metadata:
      workerIndex: 1
      description: "Apollo Bob第二个工人在右侧"

  # === 推动能力测试阶段 ===
  
  # 测试1：基本推动（向上推）
  - step: 5
    type: special_action
    player: player1
    from: {x: 2, y: 2}
    to: {x: 2, y: 1}   # 推动Apollo工人
    metadata:
      description: "Minotaur向北推动Apollo工人"
      specialAbility: minotaur_push
      pushDirection: north
      targetWorker: {player: player2, index: 0}
      pushedTo: {x: 2, y: 0}  # Apollo工人被推到 (2,0)
      
  - step: 6
    type: build
    player: player1
    to: {x: 1, y: 1}   # Minotaur建造
    metadata:
      buildType: block
      level: 1
      description: "Minotaur建造"

  # Apollo的反击回合
  - step: 7
    type: special_action
    player: player2
    from: {x: 2, y: 0}  # 被推到的位置
    to: {x: 2, y: 1}    # Apollo使用换位能力回到Minotaur位置
    metadata:
      description: "Apollo使用换位能力与Minotaur交换位置"
      specialAbility: apollo_swap
      targetWorker: {player: player1, index: 0}
      
  - step: 8
    type: build
    player: player2
    to: {x: 1, y: 0}   # Apollo建造
    metadata:
      buildType: block
      level: 1
      description: "Apollo建造"

  # 测试2：向边界推动
  - step: 9
    type: move
    player: player1
    from: {x: 2, y: 0}  # Minotaur被换到的位置
    to: {x: 3, y: 0}    # 移动到边界附近
    metadata:
      description: "Minotaur移动到边界附近准备推动测试"
      
  - step: 10
    type: build
    player: player1
    to: {x: 4, y: 0}   # 建造
    metadata:
      buildType: block
      level: 1
      description: "Minotaur建造"

  - step: 11
    type: move
    player: player2
    from: {x: 4, y: 2}
    to: {x: 4, y: 1}   # Apollo移动到边界
    metadata:
      description: "Apollo移动到边界位置"
      
  - step: 12
    type: build
    player: player2
    to: {x: 4, y: 3}   # Apollo建造
    metadata:
      buildType: block
      level: 1
      description: "Apollo建造"

  # 测试3：向右推动到边界
  - step: 13
    type: special_action
    player: player1
    from: {x: 3, y: 0}
    to: {x: 4, y: 0}   # 这会失败，因为 (4,0) 有建筑
    metadata:
      description: "尝试推动Apollo，但目标位置有建筑，应该失败"
      specialAbility: minotaur_push
      pushDirection: east
      expectedResult: fail
      failReason: "目标位置有建筑阻挡"

  # 由于推动失败，Minotaur只能常规移动
  - step: 14
    type: move
    player: player1
    from: {x: 3, y: 0}
    to: {x: 3, y: 1}   # 常规移动
    metadata:
      description: "推动失败后，Minotaur进行常规移动"
      
  - step: 15
    type: build
    player: player1
    to: {x: 2, y: 0}   # 建造
    metadata:
      buildType: block
      level: 1
      description: "Minotaur建造"

  # 测试4：成功的边界推动
  - step: 16
    type: move
    player: player2
    from: {x: 4, y: 1}
    to: {x: 3, y: 2}   # Apollo移动到新位置
    metadata:
      description: "Apollo移动到新的推动测试位置"
      
  - step: 17
    type: build
    player: player2
    to: {x: 3, y: 3}   # Apollo建造
    metadata:
      buildType: block
      level: 1
      description: "Apollo建造"

  - step: 18
    type: special_action
    player: player1
    from: {x: 3, y: 1}
    to: {x: 3, y: 2}   # 向下推动Apollo
    metadata:
      description: "Minotaur向南推动Apollo工人"
      specialAbility: minotaur_push
      pushDirection: south
      targetWorker: {player: player2, index: 1}
      pushedTo: {x: 3, y: 3}  # 但是 (3,3) 有建筑，推动失败
      expectedResult: fail
      
  # 推动失败，尝试常规移动
  - step: 19
    type: move
    player: player1
    from: {x: 3, y: 1}
    to: {x: 2, y: 1}   # 回到中心
    metadata:
      description: "推动失败，Minotaur回到中心位置"
      
  - step: 20
    type: build
    player: player1
    to: {x: 1, y: 2}   # 建造
    metadata:
      buildType: block
      level: 1
      description: "Minotaur建造"

  # 测试5：对角线推动
  - step: 21
    type: move
    player: player2
    from: {x: 3, y: 2}
    to: {x: 2, y: 3}   # Apollo移动到对角位置
    metadata:
      description: "Apollo移动到对角位置测试对角推动"
      
  - step: 22
    type: build
    player: player2
    to: {x: 1, y: 3}   # Apollo建造
    metadata:
      buildType: block
      level: 1
      description: "Apollo建造"

  - step: 23
    type: special_action
    player: player1
    from: {x: 2, y: 1}
    to: {x: 2, y: 2}   # 移动到推动位置
    metadata:
      description: "Minotaur移动到对角推动位置"
      
  - step: 24
    type: build
    player: player1
    to: {x: 3, y: 2}   # 建造
    metadata:
      buildType: block
      level: 1
      description: "Minotaur建造"

  - step: 25
    type: special_action
    player: player1
    from: {x: 2, y: 2}
    to: {x: 2, y: 3}   # 向南推动Apollo
    metadata:
      description: "Minotaur向南推动Apollo到 (2,4)"
      specialAbility: minotaur_push
      pushDirection: south
      targetWorker: {player: player2, index: 1}
      pushedTo: {x: 2, y: 4}

# 预期结果验证
expectedOutcome:
  gameState: in_progress
  boardState:
    # 最终工人位置
    "2,3":
      worker: {player: player1, index: 0}  # Minotaur工人
    "0,0":
      worker: {player: player1, index: 1}  # Minotaur另一个工人
    "2,1":
      worker: {player: player2, index: 0}  # Apollo工人
    "2,4":
      worker: {player: player2, index: 1}  # 被推动的Apollo工人
    
    # 建筑物状态
    "1,1": {level: 1}
    "1,0": {level: 1}
    "4,0": {level: 1}
    "4,3": {level: 1}
    "2,0": {level: 1}
    "3,3": {level: 1}
    "1,2": {level: 1}
    "1,3": {level: 1}
    "3,2": {level: 1}
      
  validations:
    - type: successful_pushes
      expected: 2  # 成功推动2次
      details: ["north_push_step_5", "south_push_step_25"]
    - type: failed_pushes
      expected: 2  # 失败推动2次
      details: ["blocked_by_building", "blocked_by_building"]
    - type: push_directions_tested
      expected: ["north", "east", "south"]
    - type: boundary_interactions
      expected: true
    - type: minotaur_apollo_interaction
      expected: true  # 测试了两种移动型神卡的互动

# 测试重点分析
testingFocus:
  minotaurPushMechanics:
    basicPush:
      description: "基本推动功能"
      validation: "工人被推到正确位置"
    boundaryPush:
      description: "边界推动处理"
      validation: "正确处理边界限制"
    blockedPush:
      description: "推动被阻挡情况"
      validation: "建筑物阻挡推动时正确失败"
    pushDirections:
      description: "多方向推动"
      validation: "支持四个基本方向的推动"
      
  edgeCases:
    pushToOccupiedSpace:
      description: "推动到被占用空间"
      expected: "推动失败"
    pushOffBoard:
      description: "推动出棋盘边界"
      expected: "推动失败"
    pushToBuilding:
      description: "推动到有建筑的位置"
      expected: "推动失败"

# 性能和复杂度
complexity:
  pushVariations: 4      # 不同类型的推动尝试
  godCardInteractions: 2  # Minotaur + Apollo
  boundaryTests: 3       # 多种边界情况
  blockingTests: 2       # 被阻挡的推动

# 测试变体
variants:
  - name: all_direction_push
    description: "测试所有8个方向的推动"
    additionalMoves:
      # 添加东北、东南、西北、西南方向的推动测试
      
  - name: multi_level_push
    description: "测试不同高度间的推动"
    modifySetup:
      # 预先建造不同高度的建筑测试高度限制
      
  - name: push_chain_reaction
    description: "测试推动引起的连锁反应"
    # 多个工人排成一线，测试能否推动多个工人

# 元数据
metadata:
  author: Test Development Team  
  created: "2024-01-20"
  difficulty: advanced
  estimatedDuration: 75s
  complexity: high
  relatedScenarios:
    - minotaur_basic_push
    - apollo_swap_interaction
    - boundary_movement_tests
  testPurpose: |
    全面验证Minotaur神卡推动能力的各个方面：
    1. 基本推动功能的正确性
    2. 边界条件的正确处理
    3. 阻挡情况的错误处理
    4. 与其他神卡能力的交互
  notes: |
    这个测试场景涵盖了Minotaur推动能力的大部分用例：
    - 成功推动：验证推动逻辑正确
    - 失败推动：验证错误处理正确
    - 边界测试：验证边界条件处理
    - 交互测试：验证与Apollo换位的互动
    
    Minotaur的推动能力是游戏中最具攻击性的能力之一，
    正确实现对游戏平衡至关重要。