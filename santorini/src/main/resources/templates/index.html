<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Santorini Game</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="container">
        <h1>Santorini Game</h1>
        
        <div class="game-info">
            <div id="game-state">Game State: <span id="state">SETUP</span></div>
            <div id="current-player">Current Player: <span id="player">Player A</span></div>
            <div id="message-box" class="message"></div>
        </div>
        
        <div class="game-board" id="game-board">
            <!-- Board will be generated by JavaScript -->
        </div>
        
        <div class="controls">
            <button id="reset-btn">Reset Game</button>
            <div id="worker-selection" class="hidden">
                <button id="worker-0">Select Worker 1</button>
                <button id="worker-1">Select Worker 2</button>
            </div>
        </div>
    </div>
    
    <script src="/js/game.js"></script>
</body>
</html>
